  const EXTRA_CATS = ['Reversements partenaires', 'Exclu de l\'analyse'];
  function allCategories() {
    const s = new Set();
    TXNS.forEach(t => s.add(getEffectiveCategory(t)));
    EXTRA_CATS.forEach(c => s.add(c));
    return [...s].sort();
  }

  // ------- state -------
  const stored = (() => { try { return JSON.parse(localStorage.getItem('was-cost-review-share-v1') || '{}'); } catch(e) { return {}; } })();
  const state = {
    account: stored.account || '',
    include: stored.include || 'ebitda',
    hiddenCats: new Set(stored.hiddenCats || []),
    hiddenTxns: new Set(stored.hiddenTxns || []),
    catOverrides: stored.catOverrides || {},  // {txnId: newCategory}
    vatOverrides: stored.vatOverrides || {},  // {counterparty: rateNumber or null (unknown)}
    mode: stored.mode === 'ttc' ? 'ttc' : 'ht',
    drill: null,
    drillShowHidden: false,
    activeTab: 'dashboard',
  };
  function persist() {
    try {
      localStorage.setItem('was-cost-review-share-v1', JSON.stringify({
        account: state.account, include: state.include,
        hiddenCats: [...state.hiddenCats], hiddenTxns: [...state.hiddenTxns],
        catOverrides: state.catOverrides,
        vatOverrides: state.vatOverrides,
        mode: state.mode,
      }));
    } catch(e){}
  }
  function getEffectiveCategory(t) {
    return state.catOverrides[t.id] || t.category;
  }
  function isReclassified(t) {
    return state.catOverrides[t.id] && state.catOverrides[t.id] !== t.category;
  }
  // VAT helpers
  function getEffectiveVatRate(t) {
    // Priority: user override on counterparty > rule-based rate > null (unknown)
    const cp = t.counterparty || '';
    if (cp && Object.prototype.hasOwnProperty.call(state.vatOverrides, cp)) {
      return state.vatOverrides[cp]; // may be null = explicitly "ne sait pas"
    }
    return (typeof t.vat_rate === 'number') ? t.vat_rate : null;
  }
  function getEffectiveAmount(t) {
    if (state.mode === 'ttc') return t.amount;
    const rate = getEffectiveVatRate(t);
    if (rate === null || rate === undefined) return t.amount; // treat unknown as TTC=HT
    return t.amount / (1 + rate / 100);
  }
  function isVatUnknown(t) {
    const cp = t.counterparty || '';
    if (cp && Object.prototype.hasOwnProperty.call(state.vatOverrides, cp)) {
      return state.vatOverrides[cp] === null;
    }
    return t.vat_rate === null || t.vat_rate === undefined;
  }

  const EXCLUDE_FROM_OPEX = new Set(['Prêts inter-entreprises','Frais financiers','Impôts et taxes','Frais bancaires']);
  const EXCLUDE_FROM_EBITDA = new Set(['Prêts inter-entreprises','Frais financiers','Impôts et taxes']);
  const EXCLUDE_LOANS = new Set(['Prêts inter-entreprises','Frais financiers']);

  function passesScope(t) {
    if (state.account && t.account !== state.account) return false;
    const c = getEffectiveCategory(t);
    if (c === 'Exclu de l\'analyse') return false;
    if (state.include === 'exclude-loans' && EXCLUDE_LOANS.has(c)) return false;
    if (state.include === 'opex-only' && EXCLUDE_FROM_OPEX.has(c)) return false;
    if (state.include === 'ebitda' && EXCLUDE_FROM_EBITDA.has(c)) return false;
    return true;
  }
  function getActiveTxns() {
    return TXNS.filter(t => passesScope(t) && !state.hiddenTxns.has(t.id));
  }

  function aggregate(txns) {
    const catTotals = {};
    const matrix = {};
    txns.forEach(t => {
      const c = getEffectiveCategory(t);
      const amt = getEffectiveAmount(t);
      catTotals[c] = (catTotals[c]||0) + amt;
      if (!matrix[c]) matrix[c] = {};
      matrix[c][t.month] = (matrix[c][t.month]||0) + amt;
    });
    const cats = Object.keys(catTotals).sort((a,b) => catTotals[b]-catTotals[a]);
    return { months: ALL_MONTHS, cats, catTotals, matrix };
  }

  // ------- KPIs -------
  function updateKPIs(txns, agg) {
    const total = txns.reduce((s,t)=>s+getEffectiveAmount(t), 0);
    const modeLbl = state.mode === 'ht' ? ' HT' : ' TTC';
    document.getElementById('kpi-total').textContent = fmtEUR(total);
    document.getElementById('kpi-total-sub').textContent = txns.length + ' transactions ·' + modeLbl;
    document.getElementById('kpi-monthly').textContent = fmtEUR(total / N_MONTHS);
    document.getElementById('kpi-txns').textContent = txns.length.toLocaleString('fr-FR');
    const uniqueCps = new Set(txns.map(t=>t.counterparty)).size;
    document.getElementById('kpi-cps').textContent = uniqueCps + ' contreparties uniques';
    const topCat = agg.cats[0];
    document.getElementById('kpi-top-cat').textContent = topCat || '—';
    if (topCat && total > 0) {
      const share = (agg.catTotals[topCat]/total*100).toFixed(0);
      document.getElementById('kpi-top-cat-amount').textContent = fmtEUR(agg.catTotals[topCat]) + ` · ${share}%`;
    }
  }

  function updateHiddenBanner() {
    const banner = document.getElementById('hidden-banner');
    const hiddenIds = [...state.hiddenTxns];
    const reclassN = Object.keys(state.catOverrides).filter(id => {
      const t = TXNS.find(x=>x.id===id);
      return t && state.catOverrides[id] !== t.category;
    }).length;
    if (hiddenIds.length === 0 && reclassN === 0) { banner.classList.remove('visible'); return; }
    banner.classList.add('visible');
    document.getElementById('hidden-count').textContent = hiddenIds.length;
    document.getElementById('reclassified-count').textContent = reclassN;
    const lookup = Object.fromEntries(TXNS.map(t=>[t.id,t]));
    let amt = 0;
    hiddenIds.forEach(id => { if (lookup[id]) amt += lookup[id].amount; });
    document.getElementById('hidden-amount').textContent = fmtEUR(amt);
  }

  // ------- Chart -------
  let chart = null;
  function renderChart(agg) {
    const ctx = document.getElementById('chart-stacked').getContext('2d');
    const visibleCats = agg.cats.filter(c => !state.hiddenCats.has(c));
    const datasets = visibleCats.map(cat => ({
      label: cat,
      data: agg.months.map(m => Math.round(agg.matrix[cat]?.[m] || 0)),
      backgroundColor: PALETTE[agg.cats.indexOf(cat) % PALETTE.length],
      borderWidth: 0,
      borderRadius: 2,
      _category: cat,
    }));
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: { labels: agg.months.map(m => monthLabels[m] || m), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        onClick: (evt, els) => {
          if (!els || !els.length) return;
          const el = els[0];
          const cat = datasets[el.datasetIndex]._category;
          const month = agg.months[el.index];
          openDrill(cat, month);
        },
        onHover: (e, els) => { if (e.native && e.native.target) e.native.target.style.cursor = els.length ? 'pointer' : 'default'; },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: {
            label: c => `${c.dataset.label}: ${fmtEUR(c.parsed.y)}`,
            footer: items => 'Total : ' + fmtEUR(items.reduce((s,i)=>s+i.parsed.y, 0)) + '  · clic pour voir les transactions'
          } }
        },
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { color: '#6b6b6b' } },
          y: { stacked: true, grid: { color: '#f0f0ed' }, ticks: { color: '#6b6b6b', callback: v => fmtEURshort(v) } }
        }
      }
    });

    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    agg.cats.forEach(cat => {
      const item = document.createElement('span');
      item.className = 'legend-item' + (state.hiddenCats.has(cat) ? ' muted' : '');
      const sw = document.createElement('span');
      sw.className = 'legend-swatch';
      sw.style.background = PALETTE[agg.cats.indexOf(cat) % PALETTE.length];
      item.appendChild(sw);
      const txt = document.createElement('span');
      txt.textContent = `${cat} · ${fmtEURshort(agg.catTotals[cat])}`;
      item.appendChild(txt);
      item.onclick = () => {
        if (state.hiddenCats.has(cat)) state.hiddenCats.delete(cat); else state.hiddenCats.add(cat);
        persist();
        renderAll();
      };
      legend.appendChild(item);
    });
  }

  // ------- Heatmap -------
  function renderHeatmap(agg) {
    const table = document.getElementById('heatmap');
    table.innerHTML = '';
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    tr.appendChild(document.createElement('th'));
    agg.months.forEach(m => { const th=document.createElement('th'); th.textContent=monthLabels[m]||m; tr.appendChild(th); });
    const thTotal = document.createElement('th'); thTotal.textContent = 'Total période'; tr.appendChild(thTotal);
    const thAvg = document.createElement('th'); thAvg.textContent = 'Moy / mois'; tr.appendChild(thAvg);
    thead.appendChild(tr); table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const maxVal = Math.max(0, ...agg.cats.flatMap(c => agg.months.map(m => agg.matrix[c]?.[m] || 0)));

    agg.cats.forEach(cat => {
      const row = document.createElement('tr');
      row.className = 'cat-row' + (state.drill && state.drill.cat === cat && !state.drill.month ? ' active' : '');
      const tdName = document.createElement('td');
      tdName.textContent = cat;
      tdName.title = 'Voir toutes les transactions de cette catégorie';
      tdName.onclick = () => openDrill(cat, null);
      row.appendChild(tdName);

      agg.months.forEach(m => {
        const td = document.createElement('td');
        const v = agg.matrix[cat]?.[m] || 0;
        if (v > 0) {
          td.className = 'cell';
          td.textContent = fmtEURshort(v);
          const intensity = Math.min(1, v / (maxVal * 0.6));
          td.style.background = `rgba(58, 107, 138, ${intensity * 0.18})`;
          if (state.drill && state.drill.cat === cat && state.drill.month === m) td.classList.add('active-cell');
          td.title = `${cat} · ${monthLabels[m]} → ${fmtEUR(v)} · clic pour voir les transactions`;
          td.onclick = () => openDrill(cat, m);
        } else {
          td.className = 'cell empty'; td.textContent = '—'; td.style.color = '#ccc';
        }
        row.appendChild(td);
      });

      const tdTotal = document.createElement('td');
      tdTotal.className = 'cell total-col'; tdTotal.textContent = fmtEUR(agg.catTotals[cat]);
      tdTotal.onclick = () => openDrill(cat, null);
      row.appendChild(tdTotal);

      const tdAvg = document.createElement('td');
      tdAvg.className = 'cell'; tdAvg.textContent = fmtEURshort(agg.catTotals[cat]/N_MONTHS);
      tdAvg.onclick = () => openDrill(cat, null);
      row.appendChild(tdAvg);

      tbody.appendChild(row);
    });

    // Total row
    const totalRow = document.createElement('tr');
    totalRow.className = 'total-row';
    const tdTotalLabel = document.createElement('td'); tdTotalLabel.textContent = 'Total mensuel';
    totalRow.appendChild(tdTotalLabel);
    let grand = 0;
    agg.months.forEach(m => {
      const td = document.createElement('td'); let v = 0;
      agg.cats.forEach(c => v += agg.matrix[c]?.[m] || 0);
      grand += v;
      td.textContent = fmtEURshort(v); td.className = 'cell';
      td.onclick = () => openDrill(null, m);
      td.title = `${monthLabels[m]} (toutes catégories) → ${fmtEUR(v)} · clic pour voir les transactions`;
      totalRow.appendChild(td);
    });
    const tdGrand = document.createElement('td'); tdGrand.className = 'cell total-col'; tdGrand.textContent = fmtEUR(grand);
    totalRow.appendChild(tdGrand);
    const tdGrandAvg = document.createElement('td'); tdGrandAvg.className = 'cell'; tdGrandAvg.textContent = fmtEUR(grand/N_MONTHS);
    totalRow.appendChild(tdGrandAvg);
    tbody.appendChild(totalRow);
    table.appendChild(tbody);
  }

  // ------- Drill -------
  function openDrill(cat, month) {
    state.drill = { cat, month };
    renderDrill();
    renderHeatmap(aggregate(getActiveTxns()));
    document.getElementById('drill-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  window.__closeDrill = () => { state.drill = null; renderAll(); };

  function getDrillTxns() {
    if (!state.drill) return [];
    const { cat, month } = state.drill;
    return TXNS.filter(t => {
      if (!passesScope(t) && !state.hiddenTxns.has(t.id)) {
        // Only filter by scope if not explicitly excluded by user (we still want to see "Exclu" via override)
      }
      // Apply account filter only
      if (state.account && t.account !== state.account) return false;
      const c = getEffectiveCategory(t);
      if (cat && c !== cat) return false;
      if (month && t.month !== month) return false;
      if (state.hiddenTxns.has(t.id) && !state.drillShowHidden) return false;
      return true;
    });
  }

  function renderDrill() {
    const card = document.getElementById('drill-card');
    if (!state.drill) { card.classList.remove('visible'); return; }
    card.classList.add('visible');

    const { cat, month } = state.drill;
    const titleParts = [];
    if (cat) titleParts.push(cat); else titleParts.push('Toutes catégories');
    if (month) titleParts.push(monthLabels[month] || month);
    document.getElementById('drill-title').textContent = titleParts.join(' · ');

    const txns = getDrillTxns();
    const activeTotal = txns.filter(t => !state.hiddenTxns.has(t.id)).reduce((s,t)=>s+getEffectiveAmount(t), 0);
    const hiddenCount = txns.filter(t => state.hiddenTxns.has(t.id)).length;
    document.getElementById('drill-meta').innerHTML =
      `<span class="pill amount">${fmtEUR(activeTotal)} ${state.mode==='ht'?'HT':'TTC'}</span> · ${txns.length - hiddenCount} transactions actives` +
      (hiddenCount > 0 ? ` · <span class="pill gray">${hiddenCount} masquées affichées</span>` : '');

    const btn = document.getElementById('drill-toggle-hidden');
    btn.textContent = state.drillShowHidden ? 'Cacher les masquées' : 'Montrer les masquées';
    btn.onclick = () => { state.drillShowHidden = !state.drillShowHidden; renderDrill(); };

    txns.sort((a,b) => getEffectiveAmount(b) - getEffectiveAmount(a));
    const cats = allCategories();

    const table = document.getElementById('drill-table');
    table.innerHTML = `
      <thead><tr>
        <th style="width:90px;">Date</th>
        <th>Contrepartie</th>
        <th class="num" style="width:110px;">Montant ${state.mode==='ht'?'HT':'TTC'}</th>
        <th class="num" style="width:60px;">TVA</th>
        <th style="width:230px;">Catégorie</th>
        <th>Référence</th>
        <th style="width:90px;"></th>
      </tr></thead>
      <tbody>
        ${txns.map(t => {
          const hidden = state.hiddenTxns.has(t.id);
          const effCat = getEffectiveCategory(t);
          const reclass = isReclassified(t);
          const opts = cats.map(c => `<option value="${escapeAttr(c)}" ${c===effCat?'selected':''}>${escapeHtml(c)}</option>`).join('');
          const rate = getEffectiveVatRate(t);
          const rateLbl = rate === null || rate === undefined ? '?' : (rate === 0 ? '0%' : (rate + '%'));
          return `<tr class="${hidden ? 'hidden-row' : ''} ${reclass ? 'reclassified-row' : ''}" data-id="${t.id}">
            <td>${t.date}</td>
            <td>${escapeHtml(t.counterparty || '')}</td>
            <td class="num">${fmtEUR(getEffectiveAmount(t))}</td>
            <td class="num" style="color:${rate===null||rate===undefined?'#a04949':'#6b6b6b'}; font-size:11px;">${rateLbl}</td>
            <td class="cat-cell">
              <select class="cat-select ${reclass?'changed':''}" data-id="${t.id}">${opts}</select>
            </td>
            <td style="color:#6b6b6b; font-size:11px;">${escapeHtml(t.reference || '')}</td>
            <td class="actions-cell">
              <button class="hide-btn ${hidden ? 'unhide' : ''}" data-act="${hidden ? 'unhide' : 'hide'}" data-id="${t.id}">${hidden ? 'Restaurer' : 'Masquer'}</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    `;

    table.querySelectorAll('button.hide-btn').forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      const id = b.dataset.id;
      if (b.dataset.act === 'hide') state.hiddenTxns.add(id); else state.hiddenTxns.delete(id);
      persist();
      renderAll(false); // keep drill open
    }));
    table.querySelectorAll('select.cat-select').forEach(sel => sel.addEventListener('change', e => {
      const id = sel.dataset.id;
      const t = TXNS.find(x=>x.id===id);
      if (sel.value === t.category) delete state.catOverrides[id];
      else state.catOverrides[id] = sel.value;
      persist();
      renderAll(false);
    }));
  }

  // ------- Tabs -------
  function setTab(name) {
    state.activeTab = name;
    document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
    document.querySelectorAll('.tab-panel').forEach(el => el.classList.toggle('active', el.id === 'panel-' + name));
    if (name === 'synthese') renderSynthesis();
    if (name === 'masquees') renderMasquees();
    if (name === 'tva') renderVatTab();
  }
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));
  window.__goMasquees = () => setTab('masquees');

  // ------- Mode switch (TTC / HT) -------
  document.querySelectorAll('#mode-switch .mode-btn').forEach(b => b.addEventListener('click', () => {
    state.mode = b.dataset.mode;
    document.querySelectorAll('#mode-switch .mode-btn').forEach(x => x.classList.toggle('active', x.dataset.mode === state.mode));
    persist(); renderAll();
  }));
  // Initialize the switch state from stored
  document.querySelectorAll('#mode-switch .mode-btn').forEach(x => x.classList.toggle('active', x.dataset.mode === state.mode));

  // ------- Synthesis (numbers tab) -------
  function renderSynthesis() {
    const txns = getActiveTxns();
    const agg = aggregate(txns);
    const grandTotal = txns.reduce((s,t)=>s+getEffectiveAmount(t), 0);
    const modeLbl = state.mode === 'ht' ? ' HT' : ' TTC';

    const tbl = document.getElementById('synth-table');
    const months = agg.months;
    let html = `<thead><tr><th>Catégorie</th>`;
    months.forEach(m => html += `<th>${monthLabels[m]}</th>`);
    html += `<th>Total${modeLbl}</th><th>% total</th><th>Moy/mois</th></tr></thead><tbody>`;
    agg.cats.forEach(cat => {
      html += `<tr><td>${escapeHtml(cat)}</td>`;
      months.forEach(m => {
        const v = agg.matrix[cat]?.[m] || 0;
        html += `<td class="num">${v ? fmtEUR(v) : '—'}</td>`;
      });
      const t = agg.catTotals[cat];
      const pct = grandTotal > 0 ? (t/grandTotal*100).toFixed(1) + '%' : '—';
      html += `<td class="num"><strong>${fmtEUR(t)}</strong></td><td class="num">${pct}</td><td class="num">${fmtEUR(t/N_MONTHS)}</td></tr>`;
    });
    html += `<tr class="grand"><td>Total</td>`;
    months.forEach(m => {
      let v = 0; agg.cats.forEach(c => v += agg.matrix[c]?.[m] || 0);
      html += `<td class="num">${fmtEUR(v)}</td>`;
    });
    html += `<td class="num">${fmtEUR(grandTotal)}</td><td class="num">100%</td><td class="num">${fmtEUR(grandTotal/N_MONTHS)}</td></tr></tbody>`;
    tbl.innerHTML = html;

    // Top counterparties
    const cpTotals = {};
    txns.forEach(t => {
      const cp = t.counterparty || 'Inconnu';
      if (!cpTotals[cp]) cpTotals[cp] = { total: 0, n: 0, cats: {} };
      const a = getEffectiveAmount(t);
      cpTotals[cp].total += a;
      cpTotals[cp].n += 1;
      const c = getEffectiveCategory(t);
      cpTotals[cp].cats[c] = (cpTotals[cp].cats[c] || 0) + a;
    });
    const top = Object.entries(cpTotals).sort((a,b)=>b[1].total - a[1].total).slice(0, 30);
    let html2 = `<thead><tr><th>Contrepartie</th><th>Catégorie principale</th><th>Total${modeLbl}</th><th>% total</th><th>Nb txns</th></tr></thead><tbody>`;
    top.forEach(([cp, info]) => {
      const mainCat = Object.entries(info.cats).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';
      const pct = grandTotal > 0 ? (info.total/grandTotal*100).toFixed(1) + '%' : '—';
      html2 += `<tr><td>${escapeHtml(cp)}</td><td>${escapeHtml(mainCat)}</td><td class="num">${fmtEUR(info.total)}</td><td class="num">${pct}</td><td class="num">${info.n}</td></tr>`;
    });
    html2 += '</tbody>';
    document.getElementById('synth-cps').innerHTML = html2;
  }

  // ------- Masquees tab -------
  function renderMasquees() {
    const hidden = TXNS.filter(t => state.hiddenTxns.has(t.id));
    const elH = document.getElementById('masquees-content');
    if (hidden.length === 0) elH.innerHTML = '<div style="color:#6b6b6b; font-size:13px;">Aucune transaction masquée.</div>';
    else {
      hidden.sort((a,b) => getEffectiveAmount(b) - getEffectiveAmount(a));
      const total = hidden.reduce((s,t)=>s+getEffectiveAmount(t),0);
      let h = `<div style="margin-bottom:10px;"><span class="pill warn">${hidden.length} lignes</span> <span class="pill amount">${fmtEUR(total)} exclus</span></div>`;
      h += `<div class="drill-table-wrap"><table class="drill-table">
        <thead><tr><th>Date</th><th>Contrepartie</th><th class="num">Montant</th><th>Catégorie</th><th>Référence</th><th style="width:90px;"></th></tr></thead><tbody>`;
      hidden.forEach(t => {
        h += `<tr><td>${t.date}</td><td>${escapeHtml(t.counterparty||'')}</td><td class="num">${fmtEUR(getEffectiveAmount(t))}</td><td>${escapeHtml(getEffectiveCategory(t))}</td><td style="color:#6b6b6b;font-size:11px;">${escapeHtml(t.reference||'')}</td>
        <td><button class="hide-btn unhide" onclick="window.__restoreTxn('${t.id}')">Restaurer</button></td></tr>`;
      });
      h += '</tbody></table></div>';
      elH.innerHTML = h;
    }

    const reclass = Object.keys(state.catOverrides).map(id => TXNS.find(t=>t.id===id)).filter(t => t && state.catOverrides[t.id] !== t.category);
    const elR = document.getElementById('reclass-content');
    if (reclass.length === 0) elR.innerHTML = '<div style="color:#6b6b6b; font-size:13px;">Aucun reclassement.</div>';
    else {
      reclass.sort((a,b)=>getEffectiveAmount(b) - getEffectiveAmount(a));
      let h = `<div style="margin-bottom:10px;"><span class="pill">${reclass.length} reclassements</span></div>`;
      h += `<div class="drill-table-wrap"><table class="drill-table">
        <thead><tr><th>Date</th><th>Contrepartie</th><th class="num">Montant</th><th>Catégorie d'origine</th><th>Nouvelle catégorie</th><th style="width:90px;"></th></tr></thead><tbody>`;
      reclass.forEach(t => {
        h += `<tr><td>${t.date}</td><td>${escapeHtml(t.counterparty||'')}</td><td class="num">${fmtEUR(getEffectiveAmount(t))}</td><td style="color:#6b6b6b;">${escapeHtml(t.category)}</td><td><span class="pill">${escapeHtml(state.catOverrides[t.id])}</span></td>
          <td><button class="hide-btn" onclick="window.__revertCat('${t.id}')">Annuler</button></td></tr>`;
      });
      h += '</tbody></table></div>';
      elR.innerHTML = h;
    }
  }
  window.__restoreTxn = (id) => { state.hiddenTxns.delete(id); persist(); renderAll(); };

    let stats = '';
    rates.forEach(r => {
      const info = byRate[r] || { ttc: 0, n: 0 };
      const pct = totalTtc > 0 ? (info.ttc/totalTtc*100).toFixed(0) + '%' : '—';
      const cls = 'rate-' + (r === 5.5 ? '55' : r);
      stats += `<div class="vat-stat ${cls}"><div class="vat-stat-label">${r}% TVA</div><div class="vat-stat-value">${fmtEURshort(info.ttc)}</div><div class="vat-stat-sub">${info.n} txns · ${pct}</div></div>`;
    });
    stats += `<div class="vat-stat unknown"><div class="vat-stat-label">Indéterminé</div><div class="vat-stat-value">${fmtEURshort(unknownTtc)}</div><div class="vat-stat-sub">${unknownN} txns · ${totalTtc > 0 ? (unknownTtc/totalTtc*100).toFixed(0)+'%' : '—'}</div></div>`;
    statsEl.innerHTML = stats;

    // Arbitrage list (counterparties needing decision)
    // Rebuild dynamically from current data
    const unkByCp = {};

      const ruleRate = (typeof t.vat_rate === 'number') ? t.vat_rate : null;
      const hasOverride = Object.prototype.hasOwnProperty.call(state.vatOverrides, cp);
      const isInitiallyUnknown = ruleRate === null;
      if (!isInitiallyUnknown && !hasOverride) return; // already resolved by rule
      if (!unkByCp[cp]) unkByCp[cp] = { total: 0, n: 0, examples: [], cats: new Set(), ruleRate };
      unkByCp[cp].total += t.amount;
      unkByCp[cp].n += 1;
      unkByCp[cp].cats.add(getEffectiveCategory(t));
      if (unkByCp[cp].examples.length < 2) unkByCp[cp].examples.push({date:t.date, ref:t.reference, amt:t.amount});
    });
    const cps = Object.entries(unkByCp).sort((a,b)=>b[1].total - a[1].total);
    const listEl = document.getElementById('vat-arbitrage-list');
    if (cps.length === 0) {
      listEl.innerHTML = '<div style="padding:20px; text-align:center; color:#6b6b6b; font-size:13px;">✓ Toutes les contreparties ont un taux TVA défini.</div>';
    } else {
      listEl.innerHTML = cps.map(([cp, info]) => {
        const stored = state.vatOverrides[cp];
        const hasUserAnswer = Object.prototype.hasOwnProperty.call(state.vatOverrides, cp);
        const current = hasUserAnswer ? stored : info.ruleRate;
        const cats = [...info.cats].join(' · ');
        const exemplesHtml = info.examples.map(e => `<div class="vat-example">${e.date} · ${escapeHtml(e.ref).slice(0,60)} · ${fmtEUR(e.amt)}</div>`).join('');
        const setCls = hasUserAnswer ? 'set' : '';
        const opts = [
          {v:'unknown', l:'Ne sait pas (traité 0%)'},
          {v:'0', l:'0% (exonéré / auto-liquidation / micro)'},
          {v:'5.5', l:'5.5% (alimentation)'},
          {v:'10', l:'10% (restau, transport, hôtel)'},
          {v:'20', l:'20% (B2B France standard)'},
        ];
        const optsHtml = opts.map(o => {
          let sel = false;
          if (o.v === 'unknown' && current === null) sel = true;
          else if (parseFloat(o.v) === current) sel = true;
          return `<option value="${o.v}" ${sel?'selected':''}>${o.l}</option>`;
        }).join('');
        return `<div class="vat-row ${hasUserAnswer ? 'resolved' : ''}" data-cp="${escapeAttr(cp)}">
          <div>
            <div class="vat-cp-name">${escapeHtml(cp)}</div>
            <div class="vat-cp-meta">${info.n} txn · ${escapeHtml(cats)}</div>
            ${exemplesHtml}
          </div>
          <div>
            <div class="vat-amount">${fmtEUR(info.total)}</div>
            <div class="vat-amount-meta">TTC</div>

      }).join('');
      listEl.querySelectorAll('select.vat-select').forEach(sel => sel.addEventListener('change', () => {
        const cp = sel.dataset.cp;
        const val = sel.value;

        else state.vatOverrides[cp] = parseFloat(val);

      }));
    }

    // By-rate detail table
    const byRateEl = document.getElementById('vat-by-rate');
    let html = '<table class="synth"><thead><tr><th>Taux</th><th>Total TTC</th><th>Total HT</th><th>TVA</th><th>Nb txns</th><th>% du total</th></tr></thead><tbody>';
    [0, 5.5, 10, 20].forEach(r => {
      const info = byRate[r] || { ttc: 0, n: 0 };
      const ht = info.ttc / (1 + r/100);
      const vat = info.ttc - ht;
      const pct = totalTtc > 0 ? (info.ttc/totalTtc*100).toFixed(1) + '%' : '—';
      html += `<tr><td>${r}%</td><td class="num">${fmtEUR(info.ttc)}</td><td class="num">${fmtEUR(ht)}</td><td class="num">${fmtEUR(vat)}</td><td class="num">${info.n}</td><td class="num">${pct}</td></tr>`;
    });

    else { badge.textContent = cps.length; badge.className = 'tab-badge'; }
  }

  // ------- Grid (all txns) -------
  let grid = null;
  function renderGrid() {
    const visibleTxns = TXNS.filter(t => {
      if (state.account && t.account !== state.account) return false;
      // Include all (don't filter by scope here - we want full table view)
      return true;
    });
    const cats = allCategories();
    const data = visibleTxns.map(t => [
      t.date,
      t.counterparty || '',
      getEffectiveAmount(t),
      getEffectiveCategory(t),
      t.subcategory || '',
      t.account,
      t.reference || '',
      t.id,
      state.hiddenTxns.has(t.id) ? 1 : 0,
      isReclassified(t) ? 1 : 0,
    ]);
    if (grid) {
      grid.updateConfig({ data }).forceRender();
      return;
    }
    grid = new gridjs.Grid({
      columns: [
        { name: 'Date', width: '95px' },
        { name: 'Contrepartie' },
        { name: 'Montant', formatter: v => fmtEUR(v), attributes: { style: 'text-align:right; font-variant-numeric: tabular-nums;' }, sort: { compare: (a,b) => a - b } },
        { name: 'Catégorie', width: '210px',
          formatter: (v, row) => {
            const id = row.cells[7].data;
            const reclass = row.cells[9].data === 1;
            const opts = cats.map(c => `<option value="${c.replace(/"/g,'&quot;')}" ${c===v?'selected':''}>${c}</option>`).join('');
            return gridjs.html(`<select class="cat-select ${reclass?'changed':''}" onchange="window.__changeCat('${id}', this.value)">${opts}</select>`);
          }
        },
        { name: 'Sous-cat', width: '150px' },
        { name: 'Compte', width: '170px' },
        { name: 'Référence' },
        { name: 'id', hidden: true },
        { name: 'isHidden', hidden: true },
        { name: 'isReclass', hidden: true },
        { name: 'Action', width: '95px',
          formatter: (_, row) => {
            const id = row.cells[7].data;
            const isHidden = row.cells[8].data === 1;
            return gridjs.html(`<button class="hide-btn ${isHidden?'unhide':''}" onclick="window.__toggleHide('${id}')">${isHidden?'Restaurer':'Masquer'}</button>`);
          }
        },
      ],
      data,
      search: true, sort: true,
      pagination: { limit: 25, summary: true },
    });
    grid.render(document.getElementById('txnTable'));
  }
  window.__toggleHide = (id) => { if (state.hiddenTxns.has(id)) state.hiddenTxns.delete(id); else state.hiddenTxns.add(id); persist(); renderAll(); };
  window.__changeCat = (id, val) => {
    const t = TXNS.find(x=>x.id===id);
    if (val === t.category) delete state.catOverrides[id]; else state.catOverrides[id] = val;
    persist(); renderAll();
  };

  // ------- Account filter -------
  const accounts = [...new Set(TXNS.map(t => t.account))].sort();
  const accSel = document.getElementById('filter-account');
  accounts.forEach(a => {
    const opt = document.createElement('option'); opt.value = a; opt.textContent = a;
    if (a === state.account) opt.selected = true;
    accSel.appendChild(opt);
  });
  document.getElementById('filter-include').value = state.include;
  document.getElementById('filter-account').addEventListener('change', e => { state.account = e.target.value; persist(); renderAll(); });
  document.getElementById('filter-include').addEventListener('change', e => { state.include = e.target.value; persist(); renderAll(); });

  // ------- Exports -------
  function csvEscape(v) {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (/[",;\n\r]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }
  function download(filename, content, mime='text/csv;charset=utf-8') {
    const blob = new Blob(['﻿' + content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 200);
  }
  window.__exportTxns = () => {
    const rows = [['ID','Date','Mois','Contrepartie','Montant TTC','Taux TVA','Montant HT','Source TVA','Catégorie origine','Catégorie effective','Reclassée','Masquée','Sous-cat','Référence','Compte','Méthode']];
    TXNS.forEach(t => {
      const rate = getEffectiveVatRate(t);
      const ht = (rate === null || rate === undefined) ? t.amount : t.amount/(1+rate/100);
      rows.push([
        t.id, t.date, t.month, t.counterparty, t.amount,
        rate === null || rate === undefined ? '?' : rate,
        ht.toFixed(2),
        state.vatOverrides[t.counterparty] !== undefined ? 'user_override' : t.vat_source,
        t.category, getEffectiveCategory(t),
        isReclassified(t) ? 'oui' : 'non',
        state.hiddenTxns.has(t.id) ? 'oui' : 'non',

  window.__exportSynthesis = () => {

    const rows = [head];
    agg.cats.forEach(cat => {
      const row = [cat];
      agg.months.forEach(m => row.push(agg.matrix[cat]?.[m] || 0));
      row.push(agg.catTotals[cat]);
      row.push(grand > 0 ? (agg.catTotals[cat]/grand*100).toFixed(2) + '%' : '');
      row.push(agg.catTotals[cat]/N_MONTHS);
      rows.push(row);
    });
    const totRow = ['Total'];
    agg.months.forEach(m => { let v=0; agg.cats.forEach(c => v += agg.matrix[c]?.[m]||0); totRow.push(v); });
    totRow.push(grand); totRow.push('100%'); totRow.push(grand/N_MONTHS);

        version: 2,

        reclassified_count: reclassN,
        data_period: 'jun25-may26',
      },
      account: state.account,
      include: state.include,
      mode: state.mode,
      hiddenCats: [...state.hiddenCats],
      hiddenTxns: [...state.hiddenTxns],
      catOverrides: state.catOverrides,
      vatOverrides: state.vatOverrides,
    };
    const json = JSON.stringify(blob, null, 2);
    const stamp = new Date().toISOString().slice(0,10);
    download(`WAS_cost_review_modifs_${stamp}.json`, json, 'application/json;charset=utf-8');
  };

  function applyImportedState(parsed) {
    const knownIds = new Set(TXNS.map(t => t.id));
    let unknownHidden = 0, unknownOverride = 0;
    const newHidden = new Set();
    (parsed.hiddenTxns || []).forEach(id => { if (knownIds.has(id)) newHidden.add(id); else unknownHidden++; });
    const newOverrides = {};
    Object.entries(parsed.catOverrides || {}).forEach(([id, cat]) => {
      if (knownIds.has(id)) newOverrides[id] = cat; else unknownOverride++;
    });
    state.hiddenTxns = newHidden;
    state.catOverrides = newOverrides;
    state.hiddenCats = new Set(parsed.hiddenCats || []);
    state.vatOverrides = parsed.vatOverrides || {};
    if (parsed.mode === 'ht' || parsed.mode === 'ttc') state.mode = parsed.mode;
    if (typeof parsed.account === 'string') state.account = parsed.account;
    if (typeof parsed.include === 'string') state.include = parsed.include;
    persist();
    document.querySelectorAll('#mode-switch .mode-btn').forEach(x => x.classList.toggle('active', x.dataset.mode === state.mode));
    const accSelEl = document.getElementById('filter-account');
    if (accSelEl) accSelEl.value = state.account;
    const incSelEl = document.getElementById('filter-include');
    if (incSelEl) incSelEl.value = state.include;
    renderAll();
    let msg = `✓ Restauré : ${newHidden.size} masquages, ${Object.keys(newOverrides).length} reclassements.`;

    }
    alert(msg);
  }

  document.getElementById('state-import').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed._meta && parsed._meta.type !== 'was-cost-review-state') {
          if (!confirm('Le fichier ne semble pas être un backup WAS cost review. Continuer ?')) { e.target.value = ''; return; }
        }
        applyImportedState(parsed);
      } catch (err) {
        alert('Fichier invalide : ' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  // ------- helpers -------
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s) { return String(s).replace(/"/g,'&quot;'); }

  // ------- Main render -------
  function renderAll(closeDrill = false) {
    if (closeDrill) state.drill = null;
    const txns = getActiveTxns();
    const agg = aggregate(txns);
    updateKPIs(txns, agg);
    renderChart(agg);
    renderHeatmap(agg);
    renderDrill();
    renderGrid();
    updateHiddenBanner();
    if (state.activeTab === 'synthese') renderSynthesis();
    if (state.activeTab === 'masquees') renderMasquees();
    if (state.activeTab === 'tva') renderVatTab();
    // Update tab badge for TVA — even when not active
    try { updateVatBadge(); } catch(e){}
  }
  function updateVatBadge() {
    let n = 0;
    TXNS.forEach(t => {
      if (!passesScope(t)) return;
      if (state.hiddenTxns.has(t.id)) return;
      const cp = t.counterparty || '';
      const ruleRate = (typeof t.vat_rate === 'number') ? t.vat_rate : null;
      const hasOverride = Object.prototype.hasOwnProperty.call(state.vatOverrides, cp);
      if (ruleRate === null && !hasOverride) n++;
    });
    // Count unique CPs needing answer
    const cps = new Set();
    TXNS.forEach(t => {
      if (!passesScope(t)) return;
      if (state.hiddenTxns.has(t.id)) return;
      const cp = t.counterparty || '';
      const ruleRate = (typeof t.vat_rate === 'number') ? t.vat_rate : null;
      const hasOverride = Object.prototype.hasOwnProperty.call(state.vatOverrides, cp);
      if (ruleRate === null && !hasOverride) cps.add(cp);
    });
    const badge = document.getElementById('tva-badge');
    if (cps.size === 0) { badge.textContent = '✓'; badge.className = 'tab-badge success'; }
    else { badge.textContent = cps.size; badge.className = 'tab-badge'; }
  }

  renderAll();
  // Safety net: trigger a second render after another paint cycle in case canvas measured wrong
  setTimeout(() => { try { renderAll(); } catch(e){} }, 120);
};

<script>
(function() {
  const PAYLOAD_B64 = document.getElementById('encrypted-payload').textContent.trim();
  const gate = document.getElementById('password-gate');
  const app  = document.getElementById('app-content');
  const errEl = document.getElementById('pw-error');
  const loadEl = document.getElementById('pw-loading');
  const inputEl = document.getElementById('pw-input');
  const form = document.getElementById('pw-form');
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i=0; i<bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  async function decrypt(password) {
    const raw = b64ToBytes(PAYLOAD_B64);
    const salt = raw.slice(0, 16);
    const iv   = raw.slice(16, 28);
    const ct   = raw.slice(28);
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 200000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    return new TextDecoder().decode(pt);
  }
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    loadEl.style.display = 'block';
    inputEl.disabled = true;
    try {
      const password = inputEl.value;
      const json = await decrypt(password);
      document.getElementById('dataset').textContent = json;
      gate.style.display = 'none';
      app.style.display = 'block';
      // Wait for the browser to compute layout (canvas needs real dimensions before Chart.js draws on it)
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      window.__bootApp();
    } catch (err) {
      loadEl.style.display = 'none';
      inputEl.disabled = false;
      errEl.textContent = 'Mot de passe incorrect.';
      inputEl.select();
    }
  });
})();
<\/script>
